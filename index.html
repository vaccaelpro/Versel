<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link rel="stylesheet" href="estilos.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
</head>

<body>

    <div class="bg-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="logo-icon">✦</div>
            <h1 class="titulo">ÚNETE</h1>
            <p class="subtitulo">Crea tu cuenta en segundos</p>
        </div>

        <form id="registroForm" novalidate>

            <div class="campo">
                <label for="username">Usuario</label>
                <div class="input-wrap">
                    <span class="icono">@</span>
                    <input type="text" id="username" name="username" placeholder="tu_nombre" autocomplete="off"
                        required />
                </div>
                <span class="error-msg" id="err-username"></span>
            </div>

            <div class="campo">
                <label for="email">Correo electrónico</label>
                <div class="input-wrap">
                    <span class="icono">✉</span>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" autocomplete="off"
                        required />
                </div>
                <span class="error-msg" id="err-email"></span>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <span class="icono">⬡</span>
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required />
                    <button type="button" class="toggle-pass" id="togglePass"
                        aria-label="Mostrar contraseña">👁</button>
                </div>
                <div class="pass-strength" id="passStrength">
                    <div class="bar" id="bar1"></div>
                    <div class="bar" id="bar2"></div>
                    <div class="bar" id="bar3"></div>
                    <div class="bar" id="bar4"></div>
                </div>
                <span class="error-msg" id="err-password"></span>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <span id="btnText">Crear cuenta</span>
                <span id="btnLoader" class="loader" style="display:none;"></span>
            </button>

            <div id="mensajeGlobal" class="mensaje-global" style="display:none;"></div>

        </form>

        <p class="footer-text">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>

</html>
